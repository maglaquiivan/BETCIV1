<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETCI - Assessment Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/dashboard.css" rel="stylesheet">
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-image">
                    <img src="../assets/img/logo.png" alt="BETCI Logo" class="sidebar-logo">
                </div>
                <div class="logo-text">
                    <h3>BETCI</h3>
                    <p>Trainee</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="courses.html" class="nav-link">
                            <i class="bi bi-book"></i>
                            <span>Courses</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="assessment.html" class="nav-link">
                            <i class="bi bi-clipboard-check"></i>
                            <span>Assessment</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="records.html" class="nav-link">
                            <i class="bi bi-file-earmark-text"></i>
                            <span>Records</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <div class="main-content" id="mainContent">
            <header class="top-header">
                <div class="header-left">
                    <div class="search-container">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" name="search" placeholder="Search..." class="search-input">
                    </div>
                </div>
                <div class="header-right">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <div class="user-profile" id="userProfile">
                        <div class="user-avatar">
                            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="20" fill="#E67E22"/>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" x="8" y="8">
                                    <path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" fill="white"/>
                                    <path d="M12 14C8.13401 14 5 17.134 5 21H3.5C3.5 16.3056 7.30558 12.5 12 12.5C16.6944 12.5 20.5 16.3056 20.5 21H19C19 17.134 15.866 14 12 14Z" fill="white"/>
                                </svg>
                            </svg>
                        </div>
                        <span class="user-name">KELI</span>
                        <i class="bi bi-chevron-down dropdown-arrow"></i>
                        <div class="user-dropdown" id="userDropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-avatar">
                                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <circle cx="20" cy="20" r="20" fill="#E67E22"/>
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" x="8" y="8">
                                            <path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" fill="white"/>
                                            <path d="M12 14C8.13401 14 5 17.134 5 21H3.5C3.5 16.3056 7.30558 12.5 12 12.5C16.6944 12.5 20.5 16.3056 20.5 21H19C19 17.134 15.866 14 12 14Z" fill="white"/>
                                        </svg>
                                    </svg>
                                </div>
                                <div class="dropdown-user-info">
                                    <h4>KELI STUDENT</h4>
                                    <p>keli.student@betci.edu.ph</p>
                                </div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <ul class="dropdown-menu">
                                <li>
                                    <a href="manage-profile.html">
                                        <i class="bi bi-person"></i>
                                        <span>My Profile</span>
                                    </a>
                                </li>
                                <li>
                                    <a href="settings.html">
                                        <i class="bi bi-gear"></i>
                                        <span>Settings</span>
                                    </a>
                                </li>
                                <li class="theme-toggle-item">
                                    <div class="theme-toggle-wrapper">
                                        <i class="bi bi-palette"></i>
                                        <span>Dark Mode</span>
                                        <label class="theme-switch">
                                            <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                                            <span class="theme-slider"></span>
                                        </label>
                                    </div>
                                </li>
                            </ul>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-footer">
                                <button class="logout-btn" onclick="handleLogout()">
                                    <i class="bi bi-box-arrow-right"></i>
                                    <span>Log Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <div class="section-header">
                    <h2><i class="bi bi-clipboard-check"></i> Assessment Center</h2>
                </div>
                <div class="assessment-filter">
                    <div class="filter-tabs">
                        <button class="filter-tab active" onclick="filterAssessments('all', this)">All</button>
                        <button class="filter-tab" onclick="filterAssessments('pending', this)">Pending</button>
                        <button class="filter-tab" onclick="filterAssessments('completed', this)">Completed</button>
                        <button class="filter-tab" onclick="filterAssessments('scheduled', this)">Scheduled</button>
                    </div>
                </div>
                <div class="assessment-grid" id="assessment-grid"></div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/dark-mode.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        const assessmentData = [
            {
                id: 1,
                title: 'Application Form',
                description: 'Submit your course application and required documents for enrollment consideration.',
                icon: 'bi-file-earmark-text',
                status: 'pending',
                statusText: 'Ready to Apply',
                action: 'Start Application',
                onclick: 'openApplicationForm()'
            },
            {
                id: 2,
                title: 'Admission Slip',
                description: 'Generate and download your admission slip and exam schedule for your course.',
                icon: 'bi-ticket-detailed',
                status: 'completed',
                statusText: 'Ready for Download',
                action: 'Generate Slip',
                onclick: 'openAdmissionSlip()'
            },
            {
                id: 3,
                title: 'Practical Assessment',
                description: 'Schedule your hands-on practical examination with our training instructors.',
                icon: 'bi-graph-up',
                status: 'scheduled',
                statusText: 'Scheduled: March 15, 2024',
                action: 'Reschedule',
                onclick: 'rescheduleAssessment()'
            },
            {
                id: 4,
                title: 'Certification',
                description: 'View and download your completion certificates and credentials.',
                icon: 'bi-award',
                status: 'available',
                statusText: '2 Certificates Available',
                action: 'Download Certificates',
                onclick: 'downloadCertificates()'
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadAssessments();
        });

        document.getElementById('userProfile').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-profile')) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userSession');
                sessionStorage.removeItem('userSession');
                window.location.href = '../auth/login.html';
            }
        }

        function loadAssessments() {
            const grid = document.getElementById('assessment-grid');
            grid.innerHTML = '';
            assessmentData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'assessment-card';
                card.innerHTML = `
                    <div class="assessment-icon"><i class="bi ${item.icon}"></i></div>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <div class="assessment-status ${item.status}"><i class="bi bi-clock"></i> ${item.statusText}</div>
                    <button class="assessment-btn" onclick="${item.onclick}"><i class="bi bi-arrow-right"></i> ${item.action}</button>
                `;
                grid.appendChild(card);
            });
        }

        function filterAssessments(filter, buttonElement) {
            const grid = document.getElementById('assessment-grid');
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => tab.classList.remove('active'));
            if (buttonElement) buttonElement.classList.add('active');
            grid.innerHTML = '';
            let filtered = filter !== 'all' ? assessmentData.filter(item => item.status === filter) : assessmentData;
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No assessments found</p></div>';
                return;
            }
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'assessment-card';
                card.innerHTML = `
                    <div class="assessment-icon"><i class="bi ${item.icon}"></i></div>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <div class="assessment-status ${item.status}"><i class="bi bi-clock"></i> ${item.statusText}</div>
                    <button class="assessment-btn" onclick="${item.onclick}"><i class="bi bi-arrow-right"></i> ${item.action}</button>
                `;
                grid.appendChild(card);
            });
        }

        function openApplicationForm() { alert('Opening Application Form...'); }
        function openAdmissionSlip() { alert('Generating Admission Slip...'); }
        function rescheduleAssessment() { alert('Rescheduling Assessment...'); }
        function downloadCertificates() { alert('Downloading Certificates...'); }
    </script>
</body>
</html>
