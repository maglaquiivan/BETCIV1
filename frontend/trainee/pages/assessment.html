<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BETCI | Assessment Center</title>
    <link rel="icon" type="image/x-icon" href="../assets/img/logo.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    
    <style>
        /* Hide scrollbar */
        html {
            overflow-y: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        html::-webkit-scrollbar {
            display: none;
        }
        
        body {
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        body::-webkit-scrollbar {
            display: none;
        }
        
        .assessment-header {
            background: white;
            padding: 20px 30px;
            margin-bottom: 30px;
            border-bottom: 3px solid #f0f0f0;
        }
        
        .assessment-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #E67E22;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .assessment-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .assessment-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: white;
            color: #666;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .assessment-tab:hover {
            border-color: #E67E22;
            color: #E67E22;
        }
        
        .assessment-tab.active {
            background: #E67E22;
            color: white;
            border-color: #E67E22;
        }
        
        .assessment-content {
            display: none;
        }
        
        .assessment-content.active {
            display: block;
        }
        
        .assessment-content iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* Hide scrollbar for iframe */
        .assessment-content iframe::-webkit-scrollbar {
            display: none;
        }
        
        .assessment-content iframe {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .assessment-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        
        .assessment-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #E67E22 0%, #d35400 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .assessment-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }
        
        .assessment-card p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #fff3cd;
            color: #856404;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 35px;
            background: #E67E22;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .start-btn:hover {
            background: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(230, 126, 34, 0.3);
        }
        
        @media (max-width: 768px) {
            .assessment-tabs {
                flex-direction: column;
            }
            
            .assessment-tab {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-image">
                    <img src="../assets/img/logo.png" alt="BETCI Logo" class="sidebar-logo">
                </div>
                <div class="logo-text">
                    <h3>BETCI</h3>
                    <p>Trainee</p>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="courses.html" class="nav-link">
                            <i class="bi bi-book"></i>
                            <span>Courses</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="assessment.html" class="nav-link">
                            <i class="bi bi-clipboard-check"></i>
                            <span>Assessment</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="records.html" class="nav-link">
                            <i class="bi bi-file-earmark-text"></i>
                            <span>Records</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <div class="search-container">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Search..." class="search-input">
                    </div>
                </div>
                <div class="header-right">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <button class="dark-mode-btn" id="darkModeBtn">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <div class="user-profile">
                        <div class="user-avatar">
                            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="20" fill="#E67E22"/>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" x="8" y="8">
                                    <path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" fill="white"/>
                                    <path d="M12 14C8.13401 14 5 17.134 5 21H3.5C3.5 16.3056 7.30558 12.5 12 12.5C16.6944 12.5 20.5 16.3056 20.5 21H19C19 17.134 15.866 14 12 14Z" fill="white"/>
                                </svg>
                            </svg>
                        </div>
                        <span class="user-name">TRAINEE</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                </div>
            </header>

            <!-- Assessment Content -->
            <div class="dashboard-content">
                <!-- Assessment Header -->
                <div class="assessment-header">
                    <h1>
                        <i class="bi bi-clipboard-check"></i>
                        Assessment Center
                    </h1>
                </div>

                <!-- Assessment Tabs -->
                <div class="assessment-tabs">
                    <button class="assessment-tab active" onclick="switchAssessment('application')">
                        <i class="bi bi-file-earmark-text"></i>
                        <span>Application Form</span>
                    </button>
                    <button class="assessment-tab" onclick="switchAssessment('admission')">
                        <i class="bi bi-ticket-perforated"></i>
                        <span>Admission Slip</span>
                    </button>
                    <button class="assessment-tab" onclick="switchAssessment('certification')">
                        <i class="bi bi-award"></i>
                        <span>Certification</span>
                    </button>
                </div>

                <!-- Application Form Content -->
                <div id="application" class="assessment-content active">
                    <iframe src="assessment/application-form.html" style="width: 100%; height: 800px; border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></iframe>
                </div>

                <!-- Admission Slip Content -->
                <div id="admission" class="assessment-content">
                    <iframe src="assessment/admission-slip.html" style="width: 100%; height: 800px; border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></iframe>
                </div>

                <!-- Certification Content -->
                <div id="certification" class="assessment-content">
                    <div class="assessment-card">
                        <div class="assessment-icon">
                            <i class="bi bi-award"></i>
                        </div>
                        <h2>Certification</h2>
                        <p>View and download your TESDA certificates and competency assessment results.</p>
                        <div class="status-badge">
                            <i class="bi bi-info-circle"></i>
                            No Certificates Yet
                        </div>
                        <br>
                        <button class="start-btn" disabled style="opacity: 0.5; cursor: not-allowed;">
                            <i class="bi bi-lock"></i>
                            Not Available
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/common.js"></script>
    <script>
        function switchAssessment(type) {
            // Remove active class from all tabs and contents
            document.querySelectorAll('.assessment-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.assessment-content').forEach(content => content.classList.remove('active'));
            
            // Add active class to clicked tab and corresponding content
            event.target.closest('.assessment-tab').classList.add('active');
            document.getElementById(type).classList.add('active');
        }
        
        function openForm(formType) {
            let url = '';
            let title = '';
            
            switch(formType) {
                case 'application':
                    url = 'assessment/application-form.html';
                    title = 'Application Form';
                    break;
                case 'admission':
                    url = 'assessment/admission-slip.html';
                    title = 'Admission Slip';
                    break;
                case 'registration':
                    url = 'assessment/registration-form.html';
                    title = 'Registration Form';
                    break;
            }
            
            // Open in a new window/popup
            const width = 1200;
            const height = 800;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            window.open(
                url,
                title,
                `width=${width},height=${height},left=${left},top=${top},scrollbars=yes,resizable=yes`
            );
        }
        
        // Menu toggle
        document.getElementById('menuToggle')?.addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });
    </script>
</body>
</html>
