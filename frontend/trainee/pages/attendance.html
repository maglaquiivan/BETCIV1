<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BETCI | Attendance</title>
    <meta name="description" content="BETCI Attendance Records" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/img/logo.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    
    <style>
        .attendance-section { padding: 20px; }
        .section-title { font-size: 24px; font-weight: 600; margin-bottom: 20px; color: #333; }
        
        .attendance-form-container { background: #ffffff; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .form-title { color: #E67E22; font-size: 18px; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-label { color: #333; font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea { background: #f8f9fa; border: 2px solid #ddd; color: #333; padding: 12px 14px; border-radius: 6px; font-size: 14px; transition: all 0.3s; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #E67E22; background: #fff; box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1); }
        .form-textarea { resize: vertical; min-height: 100px; }
        
        .upload-area { border: 2px dashed #E67E22; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; background: #fff8f3; }
        .upload-area:hover { border-color: #d35400; background: #ffe8d1; }
        .upload-area i { font-size: 36px; color: #E67E22; margin-bottom: 12px; }
        .upload-area p { color: #333; font-size: 14px; font-weight: 500; margin: 8px 0 4px 0; }
        .upload-area small { color: #666; font-size: 12px; }
        
        .image-preview { background: #f8f9fa; border: 2px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .image-preview img { max-width: 100%; max-height: 200px; }
        .image-preview.empty { color: #999; }
        
        .form-actions { display: flex; gap: 12px; }
        .btn-submit { background: #E67E22; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: 700; transition: all 0.3s; font-size: 14px; }
        .btn-submit:hover { background: #d35400; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3); }
        .btn-reset { background: #f0f0f0; color: #333; border: 2px solid #ddd; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: 700; transition: all 0.3s; font-size: 14px; }
        .btn-reset:hover { background: #e0e0e0; border-color: #999; }
        
        .history-container { background: #ffffff; border-radius: 12px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .history-title { font-size: 20px; font-weight: 700; color: #333; }
        .btn-export { background: #17a2b8; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.3s; }
        .btn-export:hover { background: #138496; transform: translateY(-2px); }
        
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-label { font-size: 12px; font-weight: 700; color: #333; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .filter-input, .filter-select { padding: 10px 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 13px; background: #f8f9fa; color: #333; transition: all 0.3s; }
        .filter-input:focus, .filter-select:focus { outline: none; border-color: #E67E22; background: #fff; }
        
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
        .attendance-card { background: #ffffff; border-radius: 12px; padding: 20px; border-left: 5px solid #E67E22; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        .attendance-card:hover { transform: translateY(-4px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
        .attendance-card.present { border-left-color: #28a745; }
        .attendance-card.absent { border-left-color: #dc3545; }
        .attendance-card.late { border-left-color: #ffc107; }
        
        .status-badge { display: inline-block; padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
        .status-badge.present { background: #d4edda; color: #155724; }
        .status-badge.absent { background: #f8d7da; color: #721c24; }
        .status-badge.late { background: #fff3cd; color: #856404; }
        
        .card-date { color: #666; font-size: 12px; margin-bottom: 8px; font-weight: 500; }
        .card-course { color: #333; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
        .card-detail { padding: 10px; background: #f8f9fa; border-radius: 6px; border-left: 3px solid #E67E22; }
        .card-detail-label { color: #666; font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .card-detail-value { color: #333; font-size: 13px; margin-top: 4px; font-weight: 600; }
        .card-day { color: #666; font-size: 12px; margin-top: 10px; font-weight: 500; }
        .card-notes { color: #555; font-size: 12px; margin-top: 10px; padding: 10px; background: #f8f9fa; border-left: 3px solid #E67E22; border-radius: 4px; }
        .card-action { width: 100%; background: #E67E22; border: none; color: white; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; margin-top: 12px; transition: all 0.3s; }
        .card-action:hover { background: #d35400; transform: translateY(-2px); }
        
        .empty-state { text-align: center; padding: 50px 20px; color: #999; grid-column: 1/-1; }
        .empty-state i { font-size: 56px; color: #ddd; margin-bottom: 15px; }
        .empty-state p { font-size: 16px; font-weight: 500; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 25px; align-items: center; }
        .pagination button { padding: 8px 14px; border: 2px solid #ddd; background: white; cursor: pointer; border-radius: 6px; font-size: 13px; font-weight: 600; transition: all 0.3s; color: #333; }
        .pagination button.active { background: #E67E22; color: white; border-color: #E67E22; }
        .pagination button:hover { border-color: #E67E22; color: #E67E22; }
        .pagination span { color: #666; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-image">
                    <img src="../assets/img/logo.png" alt="BETCI Logo" class="sidebar-logo">
                </div>
                <div class="logo-text">
                    <h3>BETCI</h3>
                    <p>Trainee</p>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="courses.html" class="nav-link">
                            <i class="bi bi-book"></i>
                            <span>Courses</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="assessment.html" class="nav-link">
                            <i class="bi bi-clipboard-check"></i>
                            <span>Assessment</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="records.html" class="nav-link">
                            <i class="bi bi-file-earmark-text"></i>
                            <span>Records</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <div class="search-container">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Search..." class="search-input">
                    </div>
                </div>
                <div class="header-right">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <div class="user-profile" id="userProfile">
                        <div class="user-avatar">
                            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="20" fill="#E67E22"/>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" x="8" y="8">
                                    <path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" fill="white"/>
                                    <path d="M12 14C8.13401 14 5 17.134 5 21H3.5C3.5 16.3056 7.30558 12.5 12 12.5C16.6944 12.5 20.5 16.3056 20.5 21H19C19 17.134 15.866 14 12 14Z" fill="white"/>
                                </svg>
                            </svg>
                        </div>
                        <span class="user-name" id="userName">TRAINEE</span>
                        <i class="bi bi-chevron-down dropdown-arrow"></i>
                    </div>
                </div>
            </header>

            <!-- Attendance Content -->
            <div class="attendance-section">
                <h2 class="section-title">Attendance</h2>
                
                <!-- Attendance Form -->
                <div class="attendance-form-container">
                    <div class="form-title"><i class="bi bi-pencil-square"></i> Mark Your Attendance</div>
                    <form id="attendanceForm" onsubmit="submitAttendance(event)">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Course</label>
                                <select class="form-select" id="courseSelect" required>
                                    <option value="">Select Course</option>
                                    <option value="forklift">Forklift Operation NC II</option>
                                    <option value="bulldozer">Bulldozer Operation NC II</option>
                                    <option value="excavator">Hydraulic Excavator NC II</option>
                                    <option value="dump-truck">Dump Truck Operation NC II</option>
                                    <option value="wheel-loader">Wheel Loader NC II</option>
                                    <option value="backhoe-loader">Backhoe Loader NC II</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Attendance Type</label>
                                <select class="form-select" id="attendanceType" required>
                                    <option value="">Select Type</option>
                                    <option value="theory">Theory Class</option>
                                    <option value="practical">Practical Session</option>
                                    <option value="workshop">Workshop</option>
                                    <option value="assessment">Assessment</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="statusSelect" required>
                                    <option value="">Select Status</option>
                                    <option value="present">Present</option>
                                    <option value="absent">Absent</option>
                                    <option value="late">Late</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Date</label>
                                <input type="date" class="form-input" id="attendanceDate" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Time</label>
                                <input type="time" class="form-input" id="timeIn" required>
                            </div>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label class="form-label">Upload Image</label>
                                <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                                    <i class="bi bi-cloud-arrow-up"></i>
                                    <p>Drag and drop your image here or click to select</p>
                                    <small style="color: #666;">Supported formats: JPG, PNG, GIF (Max 5MB)</small>
                                </div>
                                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Image Preview</label>
                                <div class="image-preview empty" id="imagePreview">
                                    <i class="bi bi-image"></i> No image selected
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label class="form-label">Notes (Optional)</label>
                            <textarea class="form-textarea" id="notes" placeholder="Add any additional notes..."></textarea>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn-submit">
                                <i class="bi bi-check-circle"></i> Submit Attendance
                            </button>
                            <button type="reset" class="btn-reset">
                                <i class="bi bi-arrow-clockwise"></i> Reset
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Attendance History -->
                <div class="history-container">
                    <div class="history-header">
                        <h3 class="history-title">Attendance History</h3>
                        <button class="btn-export" onclick="exportRecords()">
                            <i class="bi bi-download"></i> Export Records
                        </button>
                    </div>
                    
                    <!-- Filters -->
                    <div class="filter-row">
                        <div class="filter-group">
                            <label class="filter-label">Course</label>
                            <select class="filter-select" id="filterCourse" onchange="filterAttendance()">
                                <option value="">All Courses</option>
                                <option value="forklift">Forklift Operation NC II</option>
                                <option value="bulldozer">Bulldozer Operation NC II</option>
                                <option value="excavator">Hydraulic Excavator NC II</option>
                                <option value="dump-truck">Dump Truck Operation NC II</option>
                                <option value="wheel-loader">Wheel Loader NC II</option>
                                <option value="backhoe-loader">Backhoe Loader NC II</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Date From</label>
                            <input type="date" class="filter-input" id="filterDateFrom" onchange="filterAttendance()">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Date To</label>
                            <input type="date" class="filter-input" id="filterDateTo" onchange="filterAttendance()">
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Status</label>
                            <select class="filter-select" id="filterStatus" onchange="filterAttendance()">
                                <option value="">All Status</option>
                                <option value="present">Present</option>
                                <option value="absent">Absent</option>
                                <option value="late">Late</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Attendance List -->
                    <div class="attendance-grid" id="attendanceList">
                        <!-- Attendance records will be loaded here -->
                    </div>
                    
                    <!-- Pagination -->
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/dark-mode.js"></script>
    <script src="../assets/js/dashboard-fixed.js"></script>
    <script>
        // Load dark mode theme
        if (typeof loadTheme === 'function') {
            loadTheme();
        }
        
        let currentPage = 1;
        const recordsPerPage = 6;

        document.addEventListener('DOMContentLoaded', function() {
            loadUserData();
            document.getElementById('attendanceDate').valueAsDate = new Date();
            loadAttendanceHistory();
        });

        function loadUserData() {
            const userName = localStorage.getItem('userName') || 'TRAINEE';
            document.getElementById('userName').textContent = userName.toUpperCase();
        }

        function previewImage(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('imagePreview');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    preview.classList.remove('empty');
                };
                reader.readAsDataURL(file);
            }
        }

        function submitAttendance(event) {
            event.preventDefault();
            
            const attendance = {
                id: Date.now(),
                course: document.getElementById('courseSelect').value,
                courseLabel: document.getElementById('courseSelect').options[document.getElementById('courseSelect').selectedIndex].text,
                attendanceType: document.getElementById('attendanceType').value,
                status: document.getElementById('statusSelect').value,
                date: document.getElementById('attendanceDate').value,
                timeIn: document.getElementById('timeIn').value || '--',
                notes: document.getElementById('notes').value || 'Regular attendance',
                submittedAt: new Date().toLocaleString()
            };
            
            let records = JSON.parse(localStorage.getItem('attendanceSubmissions') || '[]');
            records.unshift(attendance);
            localStorage.setItem('attendanceSubmissions', JSON.stringify(records));
            
            alert('Attendance submitted successfully!');
            document.getElementById('attendanceForm').reset();
            document.getElementById('imagePreview').innerHTML = '<i class="bi bi-image"></i> No image selected';
            document.getElementById('imagePreview').classList.add('empty');
            document.getElementById('attendanceDate').valueAsDate = new Date();
            loadAttendanceHistory();
        }

        function filterAttendance() {
            currentPage = 1;
            loadAttendanceHistory();
        }

        function loadAttendanceHistory() {
            let records = JSON.parse(localStorage.getItem('attendanceSubmissions') || '[]');
            
            // Apply filters
            const filterCourse = document.getElementById('filterCourse').value;
            const filterDateFrom = document.getElementById('filterDateFrom').value;
            const filterDateTo = document.getElementById('filterDateTo').value;
            const filterStatus = document.getElementById('filterStatus').value;
            
            records = records.filter(r => {
                if (filterCourse && r.course !== filterCourse) return false;
                if (filterStatus && r.status !== filterStatus) return false;
                if (filterDateFrom && new Date(r.date) < new Date(filterDateFrom)) return false;
                if (filterDateTo && new Date(r.date) > new Date(filterDateTo)) return false;
                return true;
            });
            
            const totalPages = Math.ceil(records.length / recordsPerPage);
            const start = (currentPage - 1) * recordsPerPage;
            const paginatedRecords = records.slice(start, start + recordsPerPage);
            
            const attendanceList = document.getElementById('attendanceList');
            
            if (paginatedRecords.length === 0) {
                attendanceList.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <p>No attendance records found</p>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            attendanceList.innerHTML = paginatedRecords.map(record => `
                <div class="attendance-card ${record.status}">
                    <div class="status-badge ${record.status}">
                        ${record.status.toUpperCase()}
                    </div>
                    <div class="card-date">${new Date(record.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</div>
                    <div class="card-course">${record.courseLabel}</div>
                    <div class="card-details">
                        <div class="card-detail">
                            <div class="card-detail-label">Time In</div>
                            <div class="card-detail-value">${record.timeIn}</div>
                        </div>
                        <div class="card-detail">
                            <div class="card-detail-label">Type</div>
                            <div class="card-detail-value">${record.attendanceType}</div>
                        </div>
                    </div>
                    <div class="card-day">
                        <i class="bi bi-calendar-event"></i> ${new Date(record.date).toLocaleDateString('en-US', { weekday: 'long' })}
                    </div>
                    <div class="card-notes">
                        <i class="bi bi-info-circle"></i> ${record.notes}
                    </div>
                    <button class="card-action" onclick="viewAttendanceDetail(${record.id})">
                        <i class="bi bi-eye"></i> View
                    </button>
                </div>
            `).join('');
            
            // Pagination
            let paginationHTML = `<span>Showing ${start + 1} to ${Math.min(start + recordsPerPage, records.length)} of ${records.length} records</span>`;
            if (totalPages > 1) {
                paginationHTML += '<div style="margin-left: auto;">';
                if (currentPage > 1) {
                    paginationHTML += `<button onclick="currentPage--; loadAttendanceHistory()">Previous</button>`;
                }
                for (let i = 1; i <= totalPages; i++) {
                    paginationHTML += `<button ${i === currentPage ? 'class="active"' : ''} onclick="currentPage=${i}; loadAttendanceHistory()">${i}</button>`;
                }
                if (currentPage < totalPages) {
                    paginationHTML += `<button onclick="currentPage++; loadAttendanceHistory()">Next</button>`;
                }
                paginationHTML += '</div>';
            }
            document.getElementById('pagination').innerHTML = paginationHTML;
        }

        function viewAttendanceDetail(id) {
            const records = JSON.parse(localStorage.getItem('attendanceSubmissions') || '[]');
            const record = records.find(r => r.id === id);
            if (record) {
                alert(`Attendance Details\n\nCourse: ${record.courseLabel}\nDate: ${record.date}\nStatus: ${record.status}\nTime In: ${record.timeIn}\nType: ${record.attendanceType}\nNotes: ${record.notes}`);
            }
        }

        function exportRecords() {
            const records = JSON.parse(localStorage.getItem('attendanceSubmissions') || '[]');
            if (records.length === 0) {
                alert('No records to export');
                return;
            }
            alert(`Exporting ${records.length} attendance records...`);
        }

        // Sidebar toggle for mobile
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            const menuToggle = document.getElementById('menuToggle');
            
            // Load saved sidebar state
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (sidebarCollapsed) {
                sidebar.classList.add('collapsed');
                mainContent.style.marginLeft = '60px';
            }
            
            // Toggle sidebar
            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    
                    // Update main-content margin based on sidebar state
                    if (sidebar.classList.contains('collapsed')) {
                        mainContent.style.marginLeft = '60px';
                        localStorage.setItem('sidebarCollapsed', 'true');
                    } else {
                        mainContent.style.marginLeft = '210px';
                        localStorage.setItem('sidebarCollapsed', 'false');
                    }
                });
            }
        });
    </script>
</body>
</html>
