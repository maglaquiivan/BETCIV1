<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETCI - Courses & Programs</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../assets/css/styles.css?v=9" rel="stylesheet">
    <link href="../assets/css/dashboard.css?v=9" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Container -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-image">
                    <img src="../assets/img/logo.png" alt="BETCI Logo" class="sidebar-logo">
                </div>
                <div class="logo-text">
                    <h3>BETCI</h3>
                    <p>Trainee</p>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="courses.html" class="nav-link">
                            <i class="bi bi-book"></i>
                            <span>Courses</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="assessment.html" class="nav-link">
                            <i class="bi bi-clipboard-check"></i>
                            <span>Forms</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="records.html" class="nav-link">
                            <i class="bi bi-file-earmark-text"></i>
                            <span>Records</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                    <li class="nav-item nav-logout">
                        <a href="#" class="nav-link" onclick="handleLogout(); return false;">
                            <i class="bi bi-box-arrow-right"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content" id="mainContent">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="search-container">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" name="search" placeholder="Search..." class="search-input" autocomplete="off" aria-label="Search">
                    </div>
                </div>
                <div class="header-right">
                    <button class="dark-mode-btn" id="darkModeBtn" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <div class="user-profile" id="userProfile">
                        <div class="user-avatar">T</div>
                        <span class="user-name">Trainee</span>
                        <i class="bi bi-chevron-down dropdown-arrow"></i>
                        
                        <!-- User Dropdown Menu -->
                        <div class="user-dropdown" id="userDropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-avatar">T</div>
                                <div class="dropdown-user-info">
                                    <h4>Trainee User</h4>
                                    <p>trainee@betci.edu.ph</p>
                                </div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <ul class="dropdown-menu">
                                <li>
                                    <a href="manage-profile.html">
                                        <i class="bi bi-person"></i>
                                        <span>My Profile</span>
                                    </a>
                                </li>
                                <li>
                                    <a href="settings.html">
                                        <i class="bi bi-gear"></i>
                                        <span>Settings</span>
                                    </a>
                                </li>
                            </ul>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-footer">
                                <button class="logout-btn" onclick="handleLogout()">
                                    <i class="bi bi-box-arrow-right"></i>
                                    <span>Log Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Courses Section -->
            <div class="dashboard-content" style="padding: 24px;">
                <!-- Manage Courses Header -->
                <h2 style="font-size: 24px; font-weight: 700; color: var(--primary-color); margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px;">Manage Courses</h2>
                
                <!-- Tab Navigation -->
                <div class="course-tabs" style="display: flex; gap: 12px; margin-bottom: 30px;">
                    <button class="course-tab-btn active" onclick="switchCourseTab('courses')" style="display: flex; align-items: center; gap: 10px; padding: 14px 28px; background: var(--primary-color); color: white; border: 2px solid var(--primary-color); border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
                        <i class="bi bi-book" style="font-size: 20px;"></i>
                        <span>Courses</span>
                    </button>
                    <button class="course-tab-btn" onclick="switchCourseTab('competencies')" style="display: flex; align-items: center; gap: 10px; padding: 14px 28px; background: white; color: #666; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
                        <i class="bi bi-star" style="font-size: 20px;"></i>
                        <span>Competencies</span>
                    </button>
                </div>
                
                <!-- Courses Tab Content -->
                <div id="coursesTabContent" class="tab-content-section">
                    <h3 style="font-size: 20px; font-weight: 700; color: #333; margin: 0 0 24px 0;">Training Courses</h3>
                    <div class="courses-grid" id="all-courses-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px;">
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">
                            <i class="bi bi-hourglass-split" style="font-size: 64px; color: #ddd; margin-bottom: 16px;"></i>
                            <h3 style="font-size: 20px; color: #666; margin: 0 0 8px 0;">Loading Courses...</h3>
                            <p style="font-size: 14px; color: #999;">Please wait</p>
                        </div>
                    </div>
                </div>
                
                <!-- Competencies Tab Content -->
                <div id="competenciesTabContent" class="tab-content-section" style="display: none;">
                    <h3 style="font-size: 20px; font-weight: 700; color: #333; margin: 0 0 24px 0;">Course Competencies</h3>
                    
                    <!-- Competencies Grid -->
                    <div class="competencies-grid" id="competenciesContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">
                            <i class="bi bi-hourglass-split" style="font-size: 64px; color: #ddd; margin-bottom: 16px;"></i>
                            <h3 style="font-size: 20px; color: #666; margin: 0 0 8px 0;">Loading Competencies...</h3>
                            <p style="font-size: 14px; color: #999;">Please wait</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/common.js?v=7"></script>
    <script src="../assets/js/courses.js"></script>
    <script>
        // Note: API_BASE_URL is already declared in courses.js
        let competenciesLoaded = false;
        let allCompetencies = [];
        
        // Switch between tabs
        window.switchCourseTab = function(tab) {
            const tabButtons = document.querySelectorAll('.course-tab-btn');
            const coursesContent = document.getElementById('coursesTabContent');
            const competenciesContent = document.getElementById('competenciesTabContent');
            
            tabButtons.forEach(btn => {
                btn.style.background = 'white';
                btn.style.color = '#666';
                btn.style.borderColor = '#ddd';
                btn.classList.remove('active');
            });
            
            coursesContent.style.display = 'none';
            competenciesContent.style.display = 'none';
            
            if (tab === 'courses') {
                coursesContent.style.display = 'block';
                tabButtons[0].style.background = 'var(--primary-color)';
                tabButtons[0].style.color = 'white';
                tabButtons[0].style.borderColor = 'var(--primary-color)';
                tabButtons[0].classList.add('active');
            } else if (tab === 'competencies') {
                competenciesContent.style.display = 'block';
                tabButtons[1].style.background = 'var(--primary-color)';
                tabButtons[1].style.color = 'white';
                tabButtons[1].style.borderColor = 'var(--primary-color)';
                tabButtons[1].classList.add('active');
                
                if (!competenciesLoaded) {
                    loadCompetencies();
                    competenciesLoaded = true;
                }
            }
        }
        
        // Load competencies
        window.loadCompetencies = async function() {
            const container = document.getElementById('competenciesContainer');
            
            try {
                const response = await fetch(`${API_BASE_URL}/competencies`);
                if (!response.ok) throw new Error('Failed to fetch competencies');
                
                allCompetencies = await response.json();
                
                if (allCompetencies.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">
                            <i class="bi bi-star" style="font-size: 64px; color: #ddd; margin-bottom: 16px;"></i>
                            <h3 style="font-size: 20px; color: #666; margin: 0 0 8px 0;">No Competencies Yet</h3>
                            <p style="font-size: 14px; color: #999;">Competencies will appear here once courses are added</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = allCompetencies.map(comp => {
                    const totalHours = comp.units ? comp.units.reduce((sum, unit) => sum + (unit.hours || 0), 0) : 0;
                    const unitCount = comp.units ? comp.units.length : 0;
                    const totalCredits = comp.units ? comp.units.reduce((sum, unit) => sum + (unit.credits || 0), 0) : 0;
                    
                    let imageUrl = comp.image || '';
                    if (imageUrl.startsWith('data:')) {
                        // Base64 - use as-is
                    } else if (imageUrl.startsWith('http')) {
                        // Full URL - use as-is
                    } else if (imageUrl.startsWith('/assets/')) {
                        imageUrl = '../..' + imageUrl;
                    } else if (imageUrl.includes('/assets/')) {
                        const assetsPart = imageUrl.substring(imageUrl.indexOf('/assets/'));
                        imageUrl = '../..' + assetsPart;
                    } else if (imageUrl.startsWith('../')) {
                        imageUrl = '../../' + imageUrl.substring(3);
                    } else if (imageUrl && !imageUrl.startsWith('.')) {
                        imageUrl = '../../assets/img/' + imageUrl;
                    }
                    
                    return `
                        <div class="competency-card" style="background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.3s ease; border: 2px solid transparent;">
                            ${imageUrl ? `
                            <div style="width: 100%; height: 200px; overflow: hidden; background: linear-gradient(135deg, #E67E22 0%, #E67E22dd 100%); display: flex; align-items: center; justify-content: center;">
                                <img src="${imageUrl}" style="width: 100%; height: 100%; object-fit: cover;" alt="${comp.title}" onerror="this.style.display='none'">
                            </div>
                            ` : ''}
                            <div style="padding: 20px;">
                                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px;">
                                    <h4 style="font-size: 16px; font-weight: 600; color: #333; margin: 0; flex: 1;">${comp.title}</h4>
                                    <span style="padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; margin-left: 12px; background: #fff3e0; color: #e65100;">${comp.level || 'NC-II'}</span>
                                </div>
                                <div style="font-size: 13px; color: #E67E22; font-weight: 600; margin-bottom: 12px;">${comp.code || 'COMP-' + comp._id.substring(0, 6).toUpperCase()}</div>
                                <p style="font-size: 13px; color: #666; line-height: 1.6; margin: 0 0 16px 0;">${comp.description || 'No description available'}</p>
                                
                                ${comp.units && comp.units.length > 0 ? `
                                <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
                                    <div style="font-size: 12px; font-weight: 700; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
                                        <i class="bi bi-list-check" style="color: #E67E22;"></i> Units of Competency (${unitCount})
                                    </div>
                                    <ul style="list-style: none; padding: 0; margin: 0;">
                                        ${comp.units.map(unit => `
                                            <li style="font-size: 12px; color: #666; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;">
                                                <i class="bi bi-check-circle-fill" style="color: #27ae60; font-size: 10px;"></i>
                                                <span style="flex: 1;">${unit.unitTitle || unit.unitCode}</span>
                                            </li>
                                        `).join('')}
                                    </ul>
                                </div>
                                ` : ''}
                                
                                <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                                    <div style="display: flex; gap: 16px; font-size: 12px; color: #999;">
                                        <span><i class="bi bi-clock" style="color: #E67E22;"></i> ${totalHours} hours</span>
                                        <span><i class="bi bi-award" style="color: #E67E22;"></i> ${totalCredits} credits</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading competencies:', error);
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #999;">
                        <i class="bi bi-exclamation-triangle" style="font-size: 64px; color: #e74c3c; margin-bottom: 16px;"></i>
                        <h3 style="font-size: 20px; color: #666; margin: 0 0 8px 0;">Failed to Load Competencies</h3>
                        <p style="font-size: 14px; color: #999;">Please try again later</p>
                    </div>
                `;
            }
        }
        
        // Check URL parameter for tab on page load
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tabParam = urlParams.get('tab');
            
            if (tabParam === 'competencies') {
                switchCourseTab('competencies');
            }
        });
    </script>

    </div>
</body>
</html>
