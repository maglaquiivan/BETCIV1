<!DOCTYPE html>

<head>
    <!-- IMMEDIATE Extension Error Suppression - Must be first -->
    <script>
        // Comprehensive console suppression for browser extensions
        (function() {
          'use strict';
          
          // Store original console methods
          const originalError = console.error;
          const originalWarn = console.warn;
          const originalLog = console.log;
          
          // Filter function for extension-related messages
          const isExtensionError = (args) => {
            const str = String(args).toLowerCase();
            return str.includes('chrome-extension') || 
                   str.includes('dngmlblcodfobpdpecaadgfbcggfjfnm') || 
                   str.includes('web_accessible_resources') || 
                   str.includes('lockdown-install') ||
                   str.includes('ses removing') || 
                   str.includes('err_failed') || 
                   str.includes('extension context') ||
                   str.includes('metamask') ||
                   str.includes('receiving end does not exist') ||
                   str.includes('could not establish connection') ||
                   str.includes('inpage.js');
          };
          
          // Override console.error
          console.error = function(...args) {
            if (!isExtensionError(args)) {
              originalError.apply(console, args);
            }
          };
          
          // Override console.warn
          console.warn = function(...args) {
            if (!isExtensionError(args)) {
              originalWarn.apply(console, args);
            }
          };
          
          // Override console.log
          console.log = function(...args) {
            if (!isExtensionError(args)) {
              originalLog.apply(console, args);
            }
          };
          
          // Block extension errors at window level
          window.addEventListener('error', function(e) {
            if (e.filename && (e.filename.includes('chrome-extension') || 
                e.filename.includes('inpage.js') ||
                e.filename.includes('lockdown'))) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              return false;
            }
          }, true);
          
          // Block unhandled promise rejections from extensions
          window.addEventListener('unhandledrejection', function(e) {
            const message = String(e.reason || '').toLowerCase();
            if (message.includes('metamask') || 
                message.includes('extension') ||
                message.includes('receiving end') ||
                message.includes('could not establish')) {
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
              return false;
            }
          }, true);
          
          // Override fetch to suppress extension requests
          const originalFetch = window.fetch;
          window.fetch = function(...args) {
            const url = String(args[0] || '').toLowerCase();
            if (url.includes('chrome-extension') || url.includes('metamask')) {
              return Promise.reject(new Error('Extension request blocked'));
            }
            return originalFetch.apply(this, args);
          };
          
          // Prevent extension script injection
          const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
              mutation.addedNodes.forEach(function(node) {
                if (node.nodeType === 1) {
                  if (node.tagName === 'SCRIPT' && node.src && 
                      (node.src.includes('chrome-extension') || 
                       node.src.includes('inpage.js') ||
                       node.src.includes('lockdown'))) {
                    node.remove();
                  }
                }
              });
            });
          });
          
          observer.observe(document.documentElement, {
            childList: true,
            subtree: true
          });
        })();
    </script>

    <meta charset="UTF-8">

    <style>
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: 2px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: #E67E22; color: white; border-color: #E67E22; }
        .tab-btn:hover { border-color: #E67E22; }
        
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .record-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: all 0.3s ease; border: 2px solid transparent; }
        .record-card:hover { box-shadow: 0 8px 24px rgba(230, 126, 34, 0.2); transform: translateY(-4px); border-color: #E67E22; }
        
        .record-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; }
        .record-title { font-size: 18px; font-weight: 600; color: #333; }
        .record-date { font-size: 12px; color: #999; margin-top: 5px; }
        
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-failed { background: #f8d7da; color: #721c24; }
        
        .record-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .detail-item { padding: 10px; background: #f8f9fa; border-radius: 6px; }
        .detail-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; }
        .detail-value { font-size: 14px; color: #333; margin-top: 4px; font-weight: 500; }
        
        .record-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; }
        .btn-download { background: #E67E22; color: white; }
        .btn-download:hover { background: #d35400; }
        .btn-view { background: #f0f0f0; color: #333; }
        .btn-view:hover { background: #e0e0e0; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #999; grid-column: 1/-1; }
        .empty-state i { font-size: 48px; color: #ddd; margin-bottom: 15px; }
        
        .courses-filter { margin-bottom: 30px; }
        .filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-tab { padding: 10px 20px; border: 2px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s; color: #666; }
        .filter-tab.active { background: #E67E22; color: white; border-color: #E67E22; }
        .filter-tab:hover { border-color: #E67E22; color: #E67E22; }
        .filter-tab.active:hover { color: white; }
        
        @media (max-width: 768px) {
            .filter-tab { padding: 8px 16px; font-size: 13px; }
        }
        
        @media (max-width: 480px) {
            .filter-tab { padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>

        <!-- Courses Section -->
        <div class="dashboard-content">
            <div class="section-header">
                <h2><i class="bi bi-book"></i> Course & Programs</h2>
            </div>
            
            <div class="courses-filter">
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterCourses('all', this)">All Courses</button>
                    <button class="filter-tab" onclick="filterCourses('active', this)">Active</button>
                    <button class="filter-tab" onclick="filterCourses('completed', this)">Completed</button>
                    <button class="filter-tab" onclick="filterCourses('available', this)">Available</button>

    <script src="../../admin/assets/js/courses-data.js"></script>
    <script src="../../assets/js/dark-mode.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
        // Sidebar toggle for mobile
        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.querySelector('.sidebar');
            const mainContent = document.querySelector('.main-content');
            const menuToggle = document.getElementById('menuToggle');
            
            // Load saved sidebar state
            const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (sidebarCollapsed) {
                sidebar.classList.add('collapsed');
                mainContent.style.marginLeft = '60px';
            }
            
            // Toggle sidebar
            if (menuToggle) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                    
                    // Update main-content margin based on sidebar state
                    if (sidebar.classList.contains('collapsed')) {
                        mainContent.style.marginLeft = '60px';
                        localStorage.setItem('sidebarCollapsed', 'true');
                    } else {
                        mainContent.style.marginLeft = '210px';
                        localStorage.setItem('sidebarCollapsed', 'false');
                    }
                });
            }
        });

        // Initialize dark mode on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadTraineeCourses();
        });

        function switchTab(tab) {
            document.getElementById('coursesTab').style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        }

        // User profile dropdown
        document.getElementById('userProfile').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('userDropdown').classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-profile')) {
                document.getElementById('userDropdown').classList.remove('active');
            }
        });

        // Handle logout
        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userSession');
                sessionStorage.removeItem('userSession');
                window.location.href = '../auth/login.html';
            }
        }
        
        // Load courses for trainee (read-only)
        function loadTraineeCourses() {
            const courses = getCoursesData();
            const coursesGrid = document.getElementById('all-courses-grid');
            if (!coursesGrid) return;
            
            coursesGrid.innerHTML = '';
            
            courses.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-image">
                        <img src="${course.image}" alt="${course.title}">
                    </div>
                    <div class="course-body">
                        <h3 class="course-title">${course.title}</h3>
                        <p class="course-description">${course.description}</p>
                        <div class="course-meta">
                            <span class="course-level"><i class="bi bi-award"></i> ${course.level}</span>
                            <span class="course-duration"><i class="bi bi-clock"></i> ${course.duration} hours</span>
                        </div>
                        <button class="enroll-btn" onclick="enrollCourse(${course.id})">
                            <i class="bi bi-plus-circle"></i> Enroll Now
                        </button>
                    </div>
                `;
                coursesGrid.appendChild(card);
            });
        }

        function enrollCourse(courseId) {
            const course = getCourseById(courseId);
            alert('Enrolling in: ' + course.title + '\\n\\nThis would open the enrollment form.');
        }

        function filterCourses(filter, buttonElement) {
            const courses = getCoursesData();
            const coursesGrid = document.getElementById('all-courses-grid');
            const filterTabs = document.querySelectorAll('.filter-tab');
            
            // Update active filter tab
            filterTabs.forEach(tab => tab.classList.remove('active'));
            if (buttonElement) {
                buttonElement.classList.add('active');
            }
            
            coursesGrid.innerHTML = '';
            
            let filteredCourses = courses;
            
            // Filter courses based on status
            if (filter === 'active') {
                filteredCourses = courses.filter(c => c.status === 'active');
            } else if (filter === 'completed') {
                filteredCourses = courses.filter(c => c.status === 'completed');
            } else if (filter === 'available') {
                filteredCourses = courses.filter(c => c.status === 'available');
            }
            // 'all' shows all courses without filtering
            
            if (filteredCourses.length === 0) {
                coursesGrid.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>No courses found</p></div>';
                return;
            }
            
            filteredCourses.forEach(course => {
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-image">
                        <img src="${course.image}" alt="${course.title}">
                    </div>
                    <div class="course-body">
                        <h3 class="course-title">${course.title}</h3>
                        <p class="course-description">${course.description}</p>
                        <div class="course-meta">
                            <span class="course-level"><i class="bi bi-award"></i> ${course.level}</span>
                            <span class="course-duration"><i class="bi bi-clock"></i> ${course.duration} hours</span>
                        </div>
                        <button class="enroll-btn" onclick="enrollCourse(${course.id})">
                            <i class="bi bi-plus-circle"></i> Enroll Now
                        </button>
                    </div>
                `;
                coursesGrid.appendChild(card);
            });
        }
    </script>
    </div>
