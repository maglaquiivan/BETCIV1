<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BETCI | My Competencies</title>
    <meta name="description" content="BETCI Trainee Competencies" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/img/logo.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    
    <style>
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .competency-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .competency-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(230, 126, 34, 0.2);
            border-color: #E67E22;
        }

        .competency-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .competency-header h4 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
            flex: 1;
        }

        .level-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 12px;
        }

        .level-badge.NC-I {
            background: #e3f2fd;
            color: #1976d2;
        }

        .level-badge.NC-II {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .level-badge.NC-III {
            background: #fff3e0;
            color: #e65100;
        }

        .level-badge.NC-IV {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .competency-code {
            font-size: 13px;
            color: #E67E22;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .competency-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .competency-course {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            margin-bottom: 16px;
        }

        .competency-course i {
            color: #E67E22;
            font-size: 16px;
        }

        .competency-units {
            border-top: 1px solid #e0e0e0;
            padding-top: 16px;
        }

        .competency-units h5 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0 0 12px 0;
        }

        .competency-units ul {
            list-style: none;
            padding: 0;
            margin: 0 0 12px 0;
        }

        .competency-units li {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .competency-units li:last-child {
            border-bottom: none;
        }

        .unit-code {
            color: #E67E22;
            font-weight: 600;
        }

        .unit-title {
            color: #333;
        }

        .unit-hours {
            color: #999;
            font-weight: 500;
        }

        .total-hours {
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: #E67E22;
            padding-top: 8px;
            border-top: 2px solid #E67E22;
        }

        .filter-section {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .filter-select {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #E67E22;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1/-1;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #666;
            margin: 0 0 8px 0;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
        }

        /* Dark Mode */
        body.dark-mode .competency-card {
            background: #1e1e1e;
            border-color: #3a3a3a;
        }

        body.dark-mode .competency-card:hover {
            border-color: #E67E22;
        }

        body.dark-mode .competency-header h4 {
            color: #e0e0e0;
        }

        body.dark-mode .competency-description {
            color: #b0b0b0;
        }

        body.dark-mode .competency-course {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        body.dark-mode .competency-units {
            border-top-color: #3a3a3a;
        }

        body.dark-mode .competency-units h5 {
            color: #e0e0e0;
        }

        body.dark-mode .unit-title {
            color: #e0e0e0;
        }

        body.dark-mode .competency-units li {
            border-bottom-color: #2a2a2a;
        }

        body.dark-mode .filter-select {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e0e0e0;
        }

        body.dark-mode .filter-label {
            color: #e0e0e0;
        }

        @media (max-width: 768px) {
            .competencies-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .competency-units li {
                grid-template-columns: 80px 1fr auto;
                gap: 8px;
                font-size: 12px;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-image">
                    <img src="../assets/img/logo.png" alt="BETCI Logo" class="sidebar-logo">
                </div>
                <div class="logo-text">
                    <h3>BETCI</h3>
                    <p>Trainee</p>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <i class="bi bi-house-door"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="courses.html" class="nav-link">
                            <i class="bi bi-book"></i>
                            <span>Courses</span>
                        </a>
                    </li>
                    <li class="nav-item active">
                        <a href="competencies.html" class="nav-link">
                            <i class="bi bi-star"></i>
                            <span>Competencies</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="assessment.html" class="nav-link">
                            <i class="bi bi-clipboard-check"></i>
                            <span>Assessment</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="records.html" class="nav-link">
                            <i class="bi bi-file-earmark-text"></i>
                            <span>Records</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html" class="nav-link">
                            <i class="bi bi-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <div class="search-container">
                        <i class="bi bi-search"></i>
                        <input type="text" id="searchInput" name="search" placeholder="Search competencies..." class="search-input" autocomplete="off" aria-label="Search">
                    </div>
                </div>
                <div class="header-right">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="bi bi-moon-fill"></i>
                    </button>
                    <div class="user-profile" id="userProfile">
                        <div class="user-avatar">K</div>
                        <span class="user-name">KELI</span>
                        <i class="bi bi-chevron-down dropdown-arrow"></i>
                        
                        <div class="user-dropdown" id="userDropdown">
                            <div class="dropdown-header">
                                <div class="dropdown-avatar">K</div>
                                <div class="dropdown-user-info">
                                    <h4>KELI STUDENT</h4>
                                    <p>keli.student@betci.edu.ph</p>
                                </div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <ul class="dropdown-menu">
                                <li><a href="manage-profile.html"><i class="bi bi-person"></i><span>My Profile</span></a></li>
                                <li><a href="settings.html"><i class="bi bi-gear"></i><span>Settings</span></a></li>
                            </ul>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-footer">
                                <button class="logout-btn" onclick="handleLogout()">
                                    <i class="bi bi-box-arrow-right"></i>
                                    <span>Log Out</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <div class="section-header">
                    <h2><i class="bi bi-star"></i> My Competencies</h2>
                </div>

                <!-- Filter Section -->
                <div class="filter-section">
                    <span class="filter-label">Filter by Course:</span>
                    <select id="courseFilter" class="filter-select" onchange="filterByCourse(this.value)">
                        <option value="all">All Courses</option>
                    </select>
                </div>

                <!-- Competencies Grid -->
                <div class="competencies-grid" id="competenciesContainer">
                    <div class="empty-state">
                        <i class="bi bi-hourglass-split"></i>
                        <h3>Loading Competencies...</h3>
                        <p>Please wait while we fetch your competencies</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/mobile-menu.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5500/api';

        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadCompetencies();
            loadCourses();
            initUserProfile();
        });

        // Load all competencies
        async function loadCompetencies() {
            try {
                const response = await fetch(`${API_BASE_URL}/competencies`);
                if (!response.ok) throw new Error('Failed to fetch competencies');
                
                const competencies = await response.json();
                displayCompetencies(competencies);
                
            } catch (error) {
                console.error('Error loading competencies:', error);
                document.getElementById('competenciesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle"></i>
                        <h3>Failed to Load Competencies</h3>
                        <p>Please make sure the server is running</p>
                    </div>
                `;
            }
        }

        // Load courses for filter
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE_URL}/courses`);
                const courses = await response.json();
                
                const select = document.getElementById('courseFilter');
                select.innerHTML = '<option value="all">All Courses</option>' +
                    courses.map(c => `<option value="${c.courseId}">${c.title}</option>`).join('');
                
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }

        // Display competencies
        function displayCompetencies(competencies) {
            const container = document.getElementById('competenciesContainer');
            
            if (competencies.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h3>No Competencies Found</h3>
                        <p>There are no competencies available at the moment</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = competencies.map(comp => {
                const totalHours = comp.units.reduce((sum, unit) => sum + (unit.hours || 0), 0);
                
                return `
                    <div class="competency-card">
                        <div class="competency-header">
                            <h4>${comp.title}</h4>
                            <span class="level-badge ${comp.level.replace(' ', '-')}">${comp.level}</span>
                        </div>
                        <div class="competency-code">${comp.code}</div>
                        <p class="competency-description">${comp.description}</p>
                        <div class="competency-course">
                            <i class="bi bi-book"></i> ${comp.courseName}
                        </div>
                        <div class="competency-units">
                            <h5>Units (${comp.units.length})</h5>
                            <ul>
                                ${comp.units.map(unit => `
                                    <li>
                                        <span class="unit-code">${unit.unitCode}</span>
                                        <span class="unit-title">${unit.unitTitle}</span>
                                        <span class="unit-hours">${unit.hours}hrs</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div class="total-hours">Total: ${totalHours} hours</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filter by course
        async function filterByCourse(courseId) {
            try {
                let url = `${API_BASE_URL}/competencies`;
                if (courseId && courseId !== 'all') {
                    url = `${API_BASE_URL}/competencies/course/${courseId}`;
                }
                
                const response = await fetch(url);
                const competencies = await response.json();
                displayCompetencies(competencies);
                
            } catch (error) {
                console.error('Error filtering competencies:', error);
            }
        }

        // User profile dropdown
        function initUserProfile() {
            const userProfile = document.getElementById('userProfile');
            const userDropdown = document.getElementById('userDropdown');
            
            if (userProfile) {
                userProfile.addEventListener('click', function(e) {
                    e.stopPropagation();
                    userProfile.classList.toggle('active');
                });
            }

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.user-profile')) {
                    userProfile.classList.remove('active');
                }
            });
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userSession');
                sessionStorage.removeItem('userSession');
                window.location.href = '../../auth/login.html';
            }
        }

        // Dark mode toggle
        if (typeof toggleDarkMode === 'undefined') {
            window.toggleDarkMode = function() {
                const body = document.body;
                const isDark = body.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
            };
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.innerHTML = '<i class="bi bi-sun-fill"></i>';
            }
        }
    </script>
</body>
</html>
