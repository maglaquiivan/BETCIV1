<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BETCI | My Competencies</title>
    <meta name="description" content="BETCI Trainee Competencies" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/img/logo.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    
    <style>
        .competencies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .competency-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .competency-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(230, 126, 34, 0.2);
            border-color: #E67E22;
        }

        .competency-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .competency-header h4 {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
            flex: 1;
        }

        .level-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 12px;
        }

        .level-badge.NC-I {
            background: #e3f2fd;
            color: #1976d2;
        }

        .level-badge.NC-II {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .level-badge.NC-III {
            background: #fff3e0;
            color: #e65100;
        }

        .level-badge.NC-IV {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .competency-code {
            font-size: 13px;
            color: #E67E22;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .competency-description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .competency-course {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
            color: #333;
            margin-bottom: 16px;
        }

        .competency-course i {
            color: #E67E22;
            font-size: 16px;
        }

        .competency-units {
            border-top: 1px solid #e0e0e0;
            padding-top: 16px;
        }

        .competency-units h5 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin: 0 0 12px 0;
        }

        .competency-units ul {
            list-style: none;
            padding: 0;
            margin: 0 0 12px 0;
        }

        .competency-units li {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .competency-units li:last-child {
            border-bottom: none;
        }

        .competency-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-edit {
            flex: 1;
            padding: 10px;
            background: #E67E22;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-edit:hover {
            background: #d35400;
            transform: translateY(-2px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #f0f0f0;
            color: #333;
        }

        .modal-body {
            padding: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #E67E22;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 20px 24px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-primary {
            background: #E67E22;
            color: white;
        }

        .btn-primary:hover {
            background: #d35400;
        }

        /* Dark Mode Modal */
        body.dark-mode .modal-content {
            background: #1e1e1e;
        }

        body.dark-mode .modal-header {
            border-bottom-color: #3a3a3a;
        }

        body.dark-mode .modal-header h3 {
            color: #e0e0e0;
        }

        body.dark-mode .modal-close:hover {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        body.dark-mode .modal-footer {
            border-top-color: #3a3a3a;
        }

        body.dark-mode .form-label {
            color: #e0e0e0;
        }

        body.dark-mode .form-control {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e0e0e0;
        }

        body.dark-mode .competency-actions {
            border-top-color: #3a3a3a;
        }

        .unit-code {
            color: #E67E22;
            font-weight: 600;
        }

        .unit-title {
            color: #333;
        }

        .unit-hours {
            color: #999;
            font-weight: 500;
        }

        .total-hours {
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: #E67E22;
            padding-top: 8px;
            border-top: 2px solid #E67E22;
        }

        .filter-section {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .filter-select {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 200px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #E67E22;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1/-1;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #666;
            margin: 0 0 8px 0;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
        }

        /* Dark Mode */
        body.dark-mode .competency-card {
            background: #1e1e1e;
            border-color: #3a3a3a;
        }

        body.dark-mode .competency-card:hover {
            border-color: #E67E22;
        }

        body.dark-mode .competency-header h4 {
            color: #e0e0e0;
        }

        body.dark-mode .competency-description {
            color: #b0b0b0;
        }

        body.dark-mode .competency-course {
            background: #2a2a2a;
            color: #e0e0e0;
        }

        body.dark-mode .competency-units {
            border-top-color: #3a3a3a;
        }

        body.dark-mode .competency-units h5 {
            color: #e0e0e0;
        }

        body.dark-mode .unit-title {
            color: #e0e0e0;
        }

        body.dark-mode .competency-units li {
            border-bottom-color: #2a2a2a;
        }

        body.dark-mode .filter-select {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: #e0e0e0;
        }

        body.dark-mode .filter-label {
            color: #e0e0e0;
        }

        @media (max-width: 768px) {
            .competencies-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .competency-units li {
                grid-template-columns: 80px 1fr auto;
                gap: 8px;
                font-size: 12px;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Edit Competency Modal -->
    <div class="modal" id="editCompetencyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Competency</h3>
                <button class="modal-close" onclick="closeEditModal()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: 1/-1;">
                        <label class="form-label" for="editTitle">Competency Title *</label>
                        <input type="text" id="editTitle" name="editTitle" class="form-control" placeholder="e.g., Forklift Operation" autocomplete="off" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="editCode">Competency Code *</label>
                        <input type="text" id="editCode" name="editCode" class="form-control" placeholder="e.g., COMP-001" autocomplete="off" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="editLevel">Level *</label>
                        <select id="editLevel" class="form-control" required>
                            <option value="NC I">NC I</option>
                            <option value="NC II">NC II</option>
                            <option value="NC III">NC III</option>
                            <option value="NC IV">NC IV</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="grid-column: 1/-1;">
                        <label class="form-label" for="editCourse">Course *</label>
                        <select id="editCourse" class="form-control" required>
                            <option value="">Select Course</option>
                        </select>
                    </div>
                    
                    <div class="form-group" style="grid-column: 1/-1;">
                        <label class="form-label" for="editDescription">Description</label>
                        <textarea id="editDescription" class="form-control" placeholder="Competency description..." rows="4"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveCompetency()">
                    <i class="bi bi-check"></i> Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/common.js?v=3"></script>
    <script src="../assets/js/mobile-menu.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5500/api';

        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            loadCompetencies();
            loadCourses();
        });

        // Load all competencies
        async function loadCompetencies() {
            try {
                const response = await fetch(`${API_BASE_URL}/competencies`);
                if (!response.ok) throw new Error('Failed to fetch competencies');
                
                const competencies = await response.json();
                displayCompetencies(competencies);
                
            } catch (error) {
                console.error('Error loading competencies:', error);
                document.getElementById('competenciesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle"></i>
                        <h3>Failed to Load Competencies</h3>
                        <p>Please make sure the server is running</p>
                    </div>
                `;
            }
        }

        // Load courses for filter
        async function loadCourses() {
            try {
                const response = await fetch(`${API_BASE_URL}/courses`);
                const courses = await response.json();
                
                const select = document.getElementById('courseFilter');
                select.innerHTML = '<option value="all">All Courses</option>' +
                    courses.map(c => `<option value="${c.courseId}">${c.title}</option>`).join('');
                
            } catch (error) {
                console.error('Error loading courses:', error);
            }
        }

        // Display competencies
        function displayCompetencies(competencies) {
            const container = document.getElementById('competenciesContainer');
            
            if (competencies.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h3>No Competencies Found</h3>
                        <p>There are no competencies available at the moment</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = competencies.map(comp => {
                const totalHours = comp.units.reduce((sum, unit) => sum + (unit.hours || 0), 0);
                
                return `
                    <div class="competency-card">
                        <div class="competency-header">
                            <h4>${comp.title}</h4>
                            <span class="level-badge ${comp.level.replace(' ', '-')}">${comp.level}</span>
                        </div>
                        <div class="competency-code">${comp.code}</div>
                        <p class="competency-description">${comp.description}</p>
                        <div class="competency-course">
                            <i class="bi bi-book"></i> ${comp.courseName}
                        </div>
                        <div class="competency-units">
                            <h5>Units (${comp.units.length})</h5>
                            <ul>
                                ${comp.units.map(unit => `
                                    <li>
                                        <span class="unit-code">${unit.unitCode}</span>
                                        <span class="unit-title">${unit.unitTitle}</span>
                                        <span class="unit-hours">${unit.hours}hrs</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div class="total-hours">Total: ${totalHours} hours</div>
                        </div>
                        <div class="competency-actions">
                            <button class="btn-edit" onclick="openEditModal('${comp.competencyId}')">
                                <i class="bi bi-pencil"></i> Edit Competency
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        let currentCompetencyId = null;
        let allCompetencies = [];

        // Load all competencies
        async function loadCompetencies() {
            try {
                const response = await fetch(`${API_BASE_URL}/competencies`);
                if (!response.ok) throw new Error('Failed to fetch competencies');
                
                allCompetencies = await response.json();
                displayCompetencies(allCompetencies);
                
            } catch (error) {
                console.error('Error loading competencies:', error);
                document.getElementById('competenciesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-exclamation-circle"></i>
                        <h3>Failed to Load Competencies</h3>
                        <p>Please make sure the server is running</p>
                    </div>
                `;
            }
        }

        // Open edit modal
        async function openEditModal(competencyId) {
            currentCompetencyId = competencyId;
            
            // Find competency
            const competency = allCompetencies.find(c => c.competencyId === competencyId);
            if (!competency) return;
            
            // Populate form
            document.getElementById('editTitle').value = competency.title;
            document.getElementById('editCode').value = competency.code;
            document.getElementById('editLevel').value = competency.level;
            document.getElementById('editDescription').value = competency.description;
            
            // Load courses for dropdown
            try {
                const response = await fetch(`${API_BASE_URL}/courses`);
                const courses = await response.json();
                const courseSelect = document.getElementById('editCourse');
                courseSelect.innerHTML = '<option value="">Select Course</option>' +
                    courses.map(c => `<option value="${c.courseId}" ${c.courseId === competency.courseId ? 'selected' : ''}>${c.title}</option>`).join('');
            } catch (error) {
                console.error('Error loading courses:', error);
            }
            
            // Show modal
            document.getElementById('editCompetencyModal').classList.add('active');
        }

        // Close edit modal
        function closeEditModal() {
            document.getElementById('editCompetencyModal').classList.remove('active');
            currentCompetencyId = null;
        }

        // Save competency
        async function saveCompetency() {
            if (!currentCompetencyId) return;
            
            const title = document.getElementById('editTitle').value.trim();
            const code = document.getElementById('editCode').value.trim();
            const level = document.getElementById('editLevel').value;
            const courseId = document.getElementById('editCourse').value;
            const description = document.getElementById('editDescription').value.trim();
            
            if (!title || !code || !level || !courseId) {
                alert('Please fill in all required fields');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/competencies/${currentCompetencyId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title,
                        code,
                        level,
                        courseId,
                        description
                    })
                });
                
                if (!response.ok) throw new Error('Failed to update competency');
                
                // Show success message
                showNotification('Competency updated successfully!', 'success');
                
                // Close modal and reload
                closeEditModal();
                loadCompetencies();
                
            } catch (error) {
                console.error('Error updating competency:', error);
                showNotification('Failed to update competency', 'error');
            }
        }

        // Close modal when clicking outside
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('editCompetencyModal');
            if (e.target === modal) {
                closeEditModal();
            }
        });

        // Filter by course
        async function filterByCourse(courseId) {
            try {
                if (courseId && courseId !== 'all') {
                    const filtered = allCompetencies.filter(c => c.courseId === courseId);
                    displayCompetencies(filtered);
                } else {
                    displayCompetencies(allCompetencies);
                }
                
            } catch (error) {
                console.error('Error filtering competencies:', error);
            }
        }

        // Dark mode toggle
        if (typeof toggleDarkMode === 'undefined') {
            window.toggleDarkMode = function() {
                const body = document.body;
                const isDark = body.classList.toggle('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.innerHTML = isDark ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-fill"></i>';
            };
        }

        function loadTheme() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('darkModeBtn');
                if (btn) btn.innerHTML = '<i class="bi bi-sun-fill"></i>';
            }
        }
    </script>
</body>
</html>
