<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Reset Password - BETCI</title>
  <meta name="description" content="">
  <meta name="keywords" content="">
  
  <!-- Content Security Policy to block extension scripts -->

  <!-- Fonts -->

  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="../assets/css/login.css" rel="stylesheet">

  <!-- Custom Notification Modal Styles -->
  <style>
    .notification-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .notification-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .notification-modal {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      animation: slideIn 0.3s ease;
      text-align: center;
    }

    .notification-header {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
      font-family: 'Poppins', sans-serif;
    }

    .notification-message {
      font-size: 15px;
      color: #d0d0d0;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .notification-btn {
      background: linear-gradient(135deg, #E67E22 0%, #d35400 100%);
      color: white;
      border: none;
      padding: 12px 40px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .notification-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4);
    }

    .notification-btn:active {
      transform: translateY(0);
    }

    /* Dark mode adjustments */
    body.dark-mode .notification-modal {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
    }

    body:not(.dark-mode) .notification-modal {
      background: #ffffff;
    }

    body:not(.dark-mode) .notification-header {
      color: #2a2a2a;
    }

    body:not(.dark-mode) .notification-message {
      color: #666666;
    }

    /* Password strength indicator */
    .password-strength {
      margin-top: 8px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .password-strength.show {
      display: block;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #e74c3c;
    }

    .password-strength-bar.medium {
      width: 66%;
      background: #f39c12;
    }

    .password-strength-bar.strong {
      width: 100%;
      background: #27ae60;
    }

    .password-strength-text {
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .password-strength-text.show {
      display: block;
    }

    .password-strength-text.weak {
      color: #e74c3c;
    }

    .password-strength-text.medium {
      color: #f39c12;
    }

    .password-strength-text.strong {
      color: #27ae60;
    }

    /* Password toggle icon */
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #999;
      font-size: 18px;
      user-select: none;
    }

    .password-toggle:hover {
      color: #E67E22;
    }

    .form-group {
      position: relative;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Token validation message */
    .validation-message {
      text-align: center;
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-size: 14px;
    }

    .validation-message.error {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }

    .validation-message.success {
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid #27ae60;
      color: #27ae60;
    }

    .validation-message.info {
      background: rgba(52, 152, 219, 0.1);
      border: 1px solid #3498db;
      color: #3498db;
    }
  </style>

</head>

<body class="login-page">

  <!-- Dark Mode Button -->
  <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="Toggle Dark Mode" style="position: fixed; top: 20px; right: 20px; background: none; border: none; cursor: pointer; font-size: 24px; color: inherit; z-index: 1000;">
    <i class="bi bi-moon-fill"></i>
  </button>

  <div class="login-container">
    <!-- Left Side - Welcome Section -->
    <div class="login-left">
      <div class="welcome-content">
        <div class="welcome-logo">
          <img src="../assets/img/logo.png" alt="BETCI Logo">
        </div>
        <h1>Create New Password</h1>
        <p class="subtitle">Your new password must be different from previously used passwords.</p>
      </div>
    </div>

    <!-- Right Side - Reset Password Form -->
    <div class="login-right">
      <div class="login-form-container">
        <h2>Reset Password</h2>
        <p class="form-subtitle" id="formSubtitle">Enter your new password below</p>

        <!-- Token Validation Message -->
        <div id="validationMessage" style="display: none;"></div>

        <form class="login-form" id="resetPasswordForm" style="display: none;">
          <div class="form-group">
            <label for="new-password">NEW PASSWORD</label>
            <input type="password" id="new-password" class="form-control" placeholder="Enter new password" autocomplete="new-password" required>
            <span class="password-toggle" onclick="togglePassword('new-password')">
              <i class="bi bi-eye" id="new-password-icon"></i>
            </span>
            <div class="password-strength" id="password-strength">
              <div class="password-strength-bar" id="password-strength-bar"></div>
            </div>
            <div class="password-strength-text" id="password-strength-text"></div>
          </div>

          <div class="form-group">
            <label for="confirm-password">CONFIRM PASSWORD</label>
            <input type="password" id="confirm-password" class="form-control" placeholder="Confirm new password" autocomplete="new-password" required>
            <span class="password-toggle" onclick="togglePassword('confirm-password')">
              <i class="bi bi-eye" id="confirm-password-icon"></i>
            </span>
          </div>

          <button type="submit" class="btn-signin" id="submitBtn">RESET PASSWORD</button>

          <div class="back-home">
            <a href="login.html">← Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Custom Notification Modal -->
  <div class="notification-overlay" id="notificationOverlay">
    <div class="notification-modal">
      <div class="notification-header">localhost:5500 says</div>
      <div class="notification-message" id="notificationMessage">
        Password has been reset successfully!
      </div>
      <button class="notification-btn" onclick="closeNotification()">OK</button>
    </div>
  </div>

  <!-- Vendor JS Files -->
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Dark Mode -->
  <script src="../assets/js/dark-mode.js"></script>

  <!-- Reset Password JS -->
  <script>
    let resetToken = null;
    let redirectToLogin = false;

    // Show custom notification
    function showNotification(message, shouldRedirect = false) {
      const overlay = document.getElementById('notificationOverlay');
      const messageEl = document.getElementById('notificationMessage');
      messageEl.textContent = message;
      overlay.classList.add('show');
      redirectToLogin = shouldRedirect;
    }

    // Close notification
    function closeNotification() {
      const overlay = document.getElementById('notificationOverlay');
      overlay.classList.remove('show');
      
      if (redirectToLogin) {
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 300);
      }
    }

    // Close on overlay click
    document.getElementById('notificationOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeNotification();
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const overlay = document.getElementById('notificationOverlay');
        if (overlay.classList.contains('show')) {
          closeNotification();
        }
      }
    });

    // Toggle password visibility
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const icon = document.getElementById(fieldId + '-icon');
      
      if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('bi-eye');
        icon.classList.add('bi-eye-slash');
      } else {
        field.type = 'password';
        icon.classList.remove('bi-eye-slash');
        icon.classList.add('bi-eye');
      }
    }

    // Check password strength
    function checkPasswordStrength(password) {
      const strengthBar = document.getElementById('password-strength-bar');
      const strengthText = document.getElementById('password-strength-text');
      const strengthContainer = document.getElementById('password-strength');
      
      if (!password) {
        strengthContainer.classList.remove('show');
        strengthText.classList.remove('show');
        return;
      }
      
      strengthContainer.classList.add('show');
      strengthText.classList.add('show');
      
      let strength = 0;
      
      // Length check
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      
      // Character variety checks
      if (/[a-z]/.test(password)) strength++;
      if (/[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      
      // Remove all strength classes
      strengthBar.classList.remove('weak', 'medium', 'strong');
      strengthText.classList.remove('weak', 'medium', 'strong');
      
      // Apply appropriate strength class
      if (strength <= 2) {
        strengthBar.classList.add('weak');
        strengthText.classList.add('weak');
        strengthText.textContent = 'Weak password';
      } else if (strength <= 4) {
        strengthBar.classList.add('medium');
        strengthText.classList.add('medium');
        strengthText.textContent = 'Medium password';
      } else {
        strengthBar.classList.add('strong');
        strengthText.classList.add('strong');
        strengthText.textContent = 'Strong password';
      }
    }

    // Password input listener
    document.addEventListener('DOMContentLoaded', function() {
      const newPasswordField = document.getElementById('new-password');
      if (newPasswordField) {
        newPasswordField.addEventListener('input', function() {
          checkPasswordStrength(this.value);
        });
      }
    });

    // Get token from URL
    function getTokenFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('token');
    }

    // Verify token on page load
    async function verifyToken() {
      resetToken = getTokenFromUrl();
      
      if (!resetToken) {
        showValidationMessage('error', 'Invalid reset link. No token provided.');
        return;
      }
      
      showValidationMessage('info', 'Verifying reset link...');
      
      try {
        const response = await fetch(`http://localhost:5500/api/verify-reset-token/${resetToken}`);
        const data = await response.json();
        
        if (data.valid) {
          showValidationMessage('success', `Reset link is valid. ${data.expiresIn} remaining.`);
          document.getElementById('resetPasswordForm').style.display = 'block';
        } else {
          showValidationMessage('error', data.message || 'Invalid or expired reset link.');
        }
      } catch (error) {
        console.error('Error verifying token:', error);
        showValidationMessage('error', 'Failed to verify reset link. Please try again.');
      }
    }

    // Show validation message
    function showValidationMessage(type, message) {
      const msgEl = document.getElementById('validationMessage');
      msgEl.className = `validation-message ${type}`;
      msgEl.textContent = message;
      msgEl.style.display = 'block';
    }

    // Handle form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const submitBtn = document.getElementById('submitBtn');
      
      // Validate password length
      if (newPassword.length < 8) {
        showNotification('Password must be at least 8 characters long');
        return;
      }
      
      // Validate passwords match
      if (newPassword !== confirmPassword) {
        showNotification('Passwords do not match');
        return;
      }
      
      // Disable button and show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>RESETTING...';
      
      try {
        const response = await fetch('http://localhost:5500/api/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            token: resetToken,
            newPassword: newPassword
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Success - show notification and redirect to login
          showNotification('Password has been reset successfully! You can now login with your new password.', true);
        } else {
          // Error - show error message
          showNotification(data.message || 'Failed to reset password. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'RESET PASSWORD';
        }
      } catch (error) {
        console.error('Error resetting password:', error);
        showNotification('Network error. Please check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'RESET PASSWORD';
      }
    });

    // Verify token when page loads
    window.addEventListener('DOMContentLoaded', verifyToken);
  </script>

  <!-- Console Error Suppression -->
  <script>
    (function() {
      'use strict';
      
      const originalConsole = {
        error: console.error,
        warn: console.warn,
        log: console.log
      };
      
      const suppressPatterns = [
        /chrome-extension:/,
        /extension/i,
        /lockdown-install/,
        /SES Removing/,
        /web_accessible_resources/,
        /Failed to load resource.*chrome-extension/,
        /Denying load of chrome-extension/,
        /ERR_FAILED.*chrome-extension/,
        /inpage\.js/,
        /content.*script/i
      ];
      
      function shouldSuppress(message) {
        const msgStr = String(message);
        return suppressPatterns.some(pattern => pattern.test(msgStr));
      }
      
      console.error = function(...args) {
        if (!args.some(shouldSuppress)) {
          originalConsole.error.apply(console, args);
        }
      };
      
      console.warn = function(...args) {
        if (!args.some(shouldSuppress)) {
          originalConsole.warn.apply(console, args);
        }
      };
      
      window.addEventListener('error', function(e) {
        if (shouldSuppress(e.message) || shouldSuppress(e.filename)) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        if (shouldSuppress(e.reason)) {
          e.preventDefault();
          return false;
        }
      });
    })();
  </script>

</body>

</html>
