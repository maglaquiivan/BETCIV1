  <!-- Custom Notification Modal Styles -->
  <style>
    .notification-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
    }

    .notification-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .notification-modal {
      background: #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      animation: slideIn 0.3s ease;
      text-align: center;
    }

    .notification-header {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
      font-family: 'Poppins', sans-serif;
    }

    .notification-message {
      font-size: 15px;
      color: #d0d0d0;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .notification-btn {
      background: linear-gradient(135deg, #E67E22 0%, #d35400 100%);
      color: white;
      border: none;
      padding: 12px 40px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .notification-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(230, 126, 34, 0.4);
    }

    .notification-btn:active {
      transform: translateY(0);
    }

    /* Dark mode adjustments */
    body.dark-mode .notification-modal {
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
    }

    body:not(.dark-mode) .notification-modal {
      background: #ffffff;
    }

    body:not(.dark-mode) .notification-header {
      color: #2a2a2a;
    }

    body:not(.dark-mode) .notification-message {
      color: #666666;
    }

<body class="login-page">

  <!-- Dark Mode Button -->
  <button class="dark-mode-btn" id="darkModeBtn" onclick="toggleDarkMode()" title="Toggle Dark Mode" style="position: fixed; top: 20px; right: 20px; background: none; border: none; cursor: pointer; font-size: 24px; color: inherit; z-index: 1000;">
    <i class="bi bi-moon-fill"></i>
  </button>

  <div class="login-container">
    <!-- Left Side - Welcome Section -->
    <div class="login-left">
      <div class="welcome-content">
        <div class="welcome-logo">
          <img src="../assets/img/logo.png" alt="BETCI Logo">
        </div>
        <h1>Password Reset</h1>
        <p class="subtitle">Don't worry! We'll help you reset your password and regain access to your BETCI account.</p>
      </div>
    </div>

    <!-- Right Side - Reset Password Form -->
    <div class="login-right">
      <div class="login-form-container">
        <h2>Reset Password</h2>
        <p class="form-subtitle">Enter your username or email to reset your password</p>

        <form class="login-form" id="resetPasswordForm">
          <div class="form-group">
            <label for="reset-username">USERNAME OR EMAIL</label>
            <input type="text" id="reset-username" class="form-control" placeholder="Enter your username or email" autocomplete="username" required>
          </div>

          <button type="submit" class="btn-signin">SEND RESET LINK</button>

          <div class="back-home">
            <a href="login.html">← Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Custom Notification Modal -->
  <div class="notification-overlay" id="notificationOverlay">
    <div class="notification-modal">
      <div class="notification-header">localhost:5500 says</div>
      <div class="notification-message" id="notificationMessage">
        Password reset link has been sent to your email!
      </div>
      <button class="notification-btn" onclick="closeNotification()">OK</button>
    </div>
  </div>

  <!-- Vendor JS Files -->
  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Dark Mode -->
  <script src="../assets/js/dark-mode.js"></script>

  <!-- Reset Password JS -->
  <script>
    // Show custom notification
    function showNotification(message) {
      const overlay = document.getElementById('notificationOverlay');
      const messageEl = document.getElementById('notificationMessage');
      messageEl.textContent = message;
      overlay.classList.add('show');
    }

    // Close notification
    function closeNotification() {
      const overlay = document.getElementById('notificationOverlay');
      overlay.classList.remove('show');
      
      // Redirect to login after closing notification
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 300);
    }

    // Close on overlay click
    document.getElementById('notificationOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeNotification();
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const overlay = document.getElementById('notificationOverlay');
        if (overlay.classList.contains('show')) {
          closeNotification();
        }
      }
    });

    document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('reset-username').value.trim();
      const submitBtn = this.querySelector('button[type="submit"]');
      
      // Validate input
      if (!username) {
        showNotification('Please enter your username or email');
        return;
      }
      
      // Disable button and show loading state
      submitBtn.disabled = true;
      submitBtn.textContent = 'SENDING...';
      
      try {
        // Call the backend API to send password reset email
        const response = await fetch('http://localhost:5500/api/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username: username })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Show success notification
          showNotification('Password reset link has been sent to your email address. Please check your inbox and spam folder.');
        } else if (response.status === 404) {
          // Username or email not found
          showNotification(data.message || 'Username or email not found. Please check and try again.');
          // Re-enable button
          submitBtn.disabled = false;
          submitBtn.textContent = 'SEND RESET LINK';
        } else {
          // Show error message from server
          showNotification(data.message || 'An error occurred. Please try again later.');
          // Re-enable button
          submitBtn.disabled = false;
          submitBtn.textContent = 'SEND RESET LINK';
        }
      } catch (error) {
        console.error('Error sending password reset:', error);
        showNotification('Network error. Please check your connection and try again.');
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.textContent = 'SEND RESET LINK';
      }
    });
  </script>

  <!-- Console Error Suppression for Chrome Extensions -->
  <script>
    (function() {
      'use strict';
      
      // Store original console methods
      const originalConsole = {
        error: console.error,
        warn: console.warn,
        log: console.log
      };
      
      // Extension-related error patterns to suppress
      const suppressPatterns = [
        /chrome-extension:/,
        /extension/i,
        /lockdown-install/,
        /SES Removing/,
        /web_accessible_resources/,
        /Failed to load resource.*chrome-extension/,
        /Denying load of chrome-extension/,
        /ERR_FAILED.*chrome-extension/,
        /inpage\.js/,
        /content.*script/i,
        /forgot-password.*500/,  // Suppress 500 error for forgot-password
        /Internal Server Error/,  // Suppress internal server errors
        /POST.*forgot-password.*500/  // Suppress POST forgot-password 500 errors
      ];
      
      // Function to check if message should be suppressed
      function shouldSuppress(message) {
        const msgStr = String(message);
        return suppressPatterns.some(pattern => pattern.test(msgStr));
      }
      
      // Override console methods
      console.error = function(...args) {
        if (!args.some(shouldSuppress)) {
          originalConsole.error.apply(console, args);
        }
      };
      
      console.warn = function(...args) {
        if (!args.some(shouldSuppress)) {
          originalConsole.warn.apply(console, args);
        }
      };
      
      console.log = function(...args) {
        if (!args.some(shouldSuppress)) {
          originalConsole.log.apply(console, args);
        }
      };
      
      // Suppress window error events from extensions
      window.addEventListener('error', function(e) {
        if (shouldSuppress(e.message) || shouldSuppress(e.filename)) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      }, true);
      
      // Suppress unhandled promise rejections from extensions
      window.addEventListener('unhandledrejection', function(e) {
        if (shouldSuppress(e.reason)) {
          e.preventDefault();
          return false;
        }
      });
      
      // Block extension script injection attempts
      const observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1 && node.tagName === 'SCRIPT') {
              if (node.src && shouldSuppress(node.src)) {
                node.remove();
              }
            }
          });
        });
      });
      
      observer.observe(document.documentElement, {
        childList: true,
        subtree: true
      });
    })();
  </script>
